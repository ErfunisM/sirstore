
; --
; -- -- Woocommerce Extension Language Keywords
; --

PA_EX_WOOCOMMERCE_LABEL="Payzito - Woocommerce"
PA_EX_WOOCOMMERCE_DESC="Payment plugin that connects the Woocommerce plugin to Payzito and payment gateways"
PA_EX_WOOCOMMERCE_CHECKOUT_SHOW_GATEWAYS="Display gateways list"
PA_EX_WOOCOMMERCE_CHECKOUT_SHOW_GATEWAYS_DESC="By activating this option on the WooCommerce invoice page, the list of payment gateways will be displayed under the Payzito, and the user can select the desired gateway directly."
PA_EX_WOOCOMMERCE_SUCCESS_MASSAGE="Successful payment message"
PA_EX_WOOCOMMERCE_SUCCESS_MASSAGE_DESC="Enter the text of the message you want to display to the user after successful payment. You can also use the {ref_number} shortcode to display the Payzito tracking code."
PA_EX_WOOCOMMERCE_FAILED_MASSAGE="Payment failed message"
PA_EX_WOOCOMMERCE_FAILED_MASSAGE_DESC="Enter the text of the message you want to display to the user after unsuccessful payment. You can also use the {fault} shortcode to show the reason for the error. This error reason is sent from Payzito."
PA_EX_WOOCOMMERCE_DISPLAY_FINAL_PAGE="Bill summary page"
PA_EX_WOOCOMMERCE_DISPLAY_FINAL_PAGE_DESC="It is a default page for WooCommerce that exists as a standard and is displayed to the user before transferring to the portal.<br/> But to reduce the payment steps and improve the user experience, it is suggested not to activate it."
PA_EX_WOOCOMMERCE_ONE_GATEWAY_TITLE="Gateway title"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_TITLE_DESC="The title of the gateway that is displayed to the customer during the purchase"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_DESCRIPTION="Gateway description"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_DESCRIPTION_DESC="The description that will be displayed during the payment operation for the gateway"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_LOGO="Payment logo"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_LOGO_DESC="Enter the location of the payment logo from the root of the site. If you leave this option blank, no logo will be placed <br/> Note: If you want to place your own logo, place it in a path outside the payzito_config folder and route it above, so that your file will not be deleted with the Payzito update. ."
PA_EX_WOOCOMMERCE_CHECKOUT_SHOW_GATEWAYS_ALERT="Payzito gateways are currently displayed directly on the WooCommerce billing page. Change them on the Woocommerce billing page."
PA_EX_WOOCOMMERCE_CHECKOUT_LOGO_SIZE="Max logo size (px)"
PA_EX_WOOCOMMERCE_CHECKOUT_LOGO_SIZE_DESC="In this option, you can specify the maximum size of the gateway logo height in the WooCommerce invoice. The size of the logo is based on pixels and you can choose a number between 10 and 100. The default is 40 and if you set it to zero (0), the default size set in the template will be used."
PA_EX_WOOCOMMERCE_CHECKOUT_LOGO_SIZE_INVALID_VALUE="The value entered for the logo size is not correct. The number must be entered between 10 and 100."