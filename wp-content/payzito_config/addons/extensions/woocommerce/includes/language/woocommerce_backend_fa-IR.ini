PA_EX_WOOCOMMERCE_LABEL="پِی زیتو - افزونه ووکامرس"
PA_EX_WOOCOMMERCE_DESC="پلاگین پرداخت که افزونه ووکامرس را به پِی زیتو و درگاه‌های پرداخت متصل میکند"
PA_EX_WOOCOMMERCE_CHECKOUT_SHOW_GATEWAYS="نمایش فهرست درگاه‌ها"
PA_EX_WOOCOMMERCE_CHECKOUT_SHOW_GATEWAYS_DESC="با فعال کردن این گزینه، درگاه‌های فعال شده در پِی زیتو بصورت مستقیم در صفحه صورت‌حساب ووکامرس نمایش داده می شوند و کاربر در همان صفحه می تواند درگاه مورد نظر خود را انتخاب کند.<br> با غیر فعال کردن این گزینه فقط پِی زیتو به عنوان یک درگاه در صفحه صورتحساب ووکامرس نمایش داده می شود و کاربر لیست درگاه های موجود در ووکامرس را نمی تواند ببیند و مستقیم به درگاه پیش فرض متصل خواهد شد، مگر آنکه در مرحله بعد صفحه صورت حساب پِی زیتو را به کاربر نمایش دهید و بتواند از میان درگاه های فعال در پِی زیتو یکی را انتخاب کند."
PA_EX_WOOCOMMERCE_SUCCESS_MASSAGE="پیام پرداخت موفق"
PA_EX_WOOCOMMERCE_SUCCESS_MASSAGE_DESC="متن پیامی که میخواهید بعد از پرداخت موفق به کاربر نمایش دهید را وارد نمایید . همچنین می توانید از شورت کد {ref_number} برای نمایش کد رهگیری پِی زیتو استفاده نمایید."
PA_EX_WOOCOMMERCE_FAILED_MASSAGE="پیام پرداخت ناموفق"
PA_EX_WOOCOMMERCE_FAILED_MASSAGE_DESC="متن پیامی که میخواهید بعد از پرداخت ناموفق به کاربر نمایش دهید را وارد نمایید . همچنین می توانید از شورت کد {fault} برای نمایش دلیل خطای رخ داده استفاده نمایید . این دلیل خطا از پِی زیتو ارسال میگردد."
PA_EX_WOOCOMMERCE_DISPLAY_FINAL_PAGE="صفحه خلاصه صورتحساب"
PA_EX_WOOCOMMERCE_DISPLAY_FINAL_PAGE_DESC="یک صفحه پیش فرض برای ووکامرس است که به صورت استاندارد وجود دارد و به کاربر قبل از انتقال به درگاه نمایش داده می شود.<br/> اما برای کم کردن مراحل پرداخت و بهبود تجربه کاربری پیشنهاد می شود آن را فعال نکنید."
PA_EX_WOOCOMMERCE_ONE_GATEWAY_TITLE="عنوان درگاه"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_TITLE_DESC="عنوان درگاه که در طی خرید به مشتری نمایش داده میشود"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_DESCRIPTION="توضیحات درگاه"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_DESCRIPTION_DESC="توضیحاتی که در طی عملیات پرداخت برای درگاه نمایش داده خواهد شد"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_LOGO="لوگوی پرداخت"
PA_EX_WOOCOMMERCE_ONE_GATEWAY_LOGO_DESC="محل قرارگیری لوگوی پرداخت از ریشه سایت را وارد نمایید. درصورت خالی گذاشتن این گزینه هیچ لوگویی قرار داده نمی شود <br/> نکته: اگر می خواهید لوگوی اختصاصی خود را قرار دهید در مسیری خارج از پوشه payzito_config قرار دهید و در بالا مسیر دهی کنید، تا با آپدیت پی زیتو فایل شما حذف نشود."
PA_EX_WOOCOMMERCE_CHECKOUT_SHOW_GATEWAYS_ALERT="در حال حاضر درگاه های پِی زیتو مستقیم در صفحه صورتحساب ووکامرس نمایش داده می شوند.<br> می توانید از طریق بخش <a href='{link}' target='_blank'>منوی درگاه‌ها</a> شکل ظاهری و تنظیمات آنها را در صفحه صورتحساب ووکامرس تغییر دهید."
PA_EX_WOOCOMMERCE_CHECKOUT_LOGO_SIZE="حداکثر سایز لوگو"
PA_EX_WOOCOMMERCE_CHECKOUT_LOGO_SIZE_DESC="در این گزینه می توانید حداکثر سایز ارتفاع لوگوی درگاه ها در صورتحساب ووکامرس را مشخص نمایید. سایز لوگو بر اساس پیکسل بوده و یک عدد بین ۱۰ تا ۱۰۰ را می توانید انتخاب کنید.<br> پیش‌فرض بر روی ۴۰ است و اگر بر روی صفر (0) قرار دهید از سایز پیش‌فرض تنظیم شده در قالب استفاده خواهد شد."
PA_EX_WOOCOMMERCE_CHECKOUT_LOGO_SIZE_INVALID_VALUE="مقدار وارد شده برای سایز لوگو صحیح نمی باشد. عدد باید بین ۱۰ تا ۱۰۰ وارد شود."